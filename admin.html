<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyrflo — Dashboard Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0f1e;
    color: #e2e8f0;
    min-height: 100vh;
  }

  /* ===== LOGIN ===== */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #0a0f1e 0%, #1a2744 100%);
  }
  .login-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    backdrop-filter: blur(10px);
  }
  .login-box h1 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 8px;
    color: #fff;
  }
  .login-box p {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 32px;
    font-size: 0.9rem;
  }
  .login-box input {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: #fff;
    font-size: 1rem;
    margin-bottom: 16px;
    outline: none;
    transition: border 0.2s;
  }
  .login-box input:focus { border-color: #3b82f6; }
  .login-box button {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .login-box button:hover { opacity: 0.9; }
  #login-error {
    color: #f87171;
    text-align: center;
    margin-top: 12px;
    font-size: 0.9rem;
    display: none;
  }

  /* ===== DASHBOARD ===== */
  #dashboard { display: none; }

  .topbar {
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo { font-size: 1.4rem; font-weight: 700; color: #fff; }
  .topbar-logo span { color: #3b82f6; }
  .topbar-badge {
    background: #1d4ed8;
    color: #fff;
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .topbar-user { color: #94a3b8; font-size: 0.9rem; }
  .btn-logout {
    background: rgba(239,68,68,0.15);
    color: #f87171;
    border: 1px solid rgba(239,68,68,0.3);
    padding: 7px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: background 0.2s;
  }
  .btn-logout:hover { background: rgba(239,68,68,0.25); }

  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .section-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #64748b;
    margin-bottom: 16px;
    margin-top: 32px;
  }

  /* ===== CARDS STATS ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 8px;
  }
  .stat-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px;
    transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-icon { font-size: 1.6rem; margin-bottom: 12px; }
  .stat-value {
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label { font-size: 0.8rem; color: #64748b; font-weight: 500; }
  .stat-card.blue { border-color: rgba(59,130,246,0.3); }
  .stat-card.blue .stat-value { color: #3b82f6; }
  .stat-card.yellow { border-color: rgba(234,179,8,0.3); }
  .stat-card.yellow .stat-value { color: #eab308; }
  .stat-card.green { border-color: rgba(34,197,94,0.3); }
  .stat-card.green .stat-value { color: #22c55e; }
  .stat-card.purple { border-color: rgba(168,85,247,0.3); }
  .stat-card.purple .stat-value { color: #a855f7; }
  .stat-card.cyan { border-color: rgba(6,182,212,0.3); }
  .stat-card.cyan .stat-value { color: #06b6d4; }

  /* ===== TOP EXCURSIONS ===== */
  .top-exc {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 8px;
  }
  .top-exc h3 {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 20px;
  }
  .bar-item { margin-bottom: 16px; }
  .bar-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 0.85rem;
  }
  .bar-name { color: #e2e8f0; }
  .bar-count { color: #64748b; font-weight: 600; }
  .bar-track {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #1d4ed8, #3b82f6);
    border-radius: 4px;
    transition: width 0.8s ease;
  }

  /* ===== TABLE RESERVATIONS ===== */
  .table-wrap {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    overflow: hidden;
  }
  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .table-header h3 { font-size: 1rem; font-weight: 600; color: #fff; }
  .btn-refresh {
    background: rgba(59,130,246,0.15);
    color: #3b82f6;
    border: 1px solid rgba(59,130,246,0.3);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: background 0.2s;
  }
  .btn-refresh:hover { background: rgba(59,130,246,0.25); }

  table { width: 100%; border-collapse: collapse; }
  th {
    background: rgba(255,255,255,0.03);
    color: #64748b;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 12px 20px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  td {
    padding: 14px 20px;
    font-size: 0.88rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: #cbd5e1;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .ref { font-family: monospace; color: #fff; font-size: 0.82rem; }
  .name { color: #fff; font-weight: 500; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
  }
  .badge.en_attente  { background: rgba(234,179,8,0.15);  color: #eab308; }
  .badge.confirme    { background: rgba(34,197,94,0.15);  color: #22c55e; }
  .badge.embarque    { background: rgba(6,182,212,0.15);  color: #06b6d4; }
  .badge.annule      { background: rgba(239,68,68,0.15);  color: #f87171; }

  .status-select {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #e2e8f0;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    outline: none;
  }
  .status-select:focus { border-color: #3b82f6; }

  .btn-save {
    background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    color: #fff;
    border: none;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 0.78rem;
    cursor: pointer;
    margin-left: 6px;
    transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.85; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #22c55e;
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 1000;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: #ef4444; }

  .loading {
    text-align: center;
    color: #64748b;
    padding: 40px;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<!-- ===== ECRAN DE CONNEXION ===== -->
<div id="login-screen">
  <div class="login-box">
    <h1>🚢 Cyrflo</h1>
    <p>Espace administrateur</p>
    <input type="email" id="adminEmail" placeholder="Email admin" value="cyril@cyrflo.cg">
    <input type="password" id="adminPassword" placeholder="Mot de passe" value="">
    <button onclick="adminLogin()">Se connecter</button>
    <div id="login-error">Email ou mot de passe incorrect</div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">Cyrflo <span>le Koulou</span></div>
      <span class="topbar-badge">ADMIN</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="adminName"></span>
      <button class="btn-logout" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="main">

    <!-- Compteurs -->
    <div class="section-title">Vue d'ensemble</div>
    <div class="stats-grid" id="stats-grid">
      <div class="loading">Chargement des statistiques...</div>
    </div>

    <!-- Top excursions -->
    <div class="section-title">Excursions les plus réservées</div>
    <div class="top-exc">
      <h3>📊 Classement des destinations</h3>
      <div id="top-exc-bars"><div class="loading">Chargement...</div></div>
    </div>

    <!-- Table réservations -->
    <div class="section-title">Gestion des réservations</div>
    <div class="table-wrap">
      <div class="table-header">
        <h3>🗂️ Toutes les réservations</h3>
        <button class="btn-refresh" onclick="loadAll()">🔄 Actualiser</button>
      </div>
      <div id="table-body">
        <div class="loading">Chargement des réservations...</div>
      </div>
    </div>

  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:4000/api'
    : 'https://cyrflolekoulou-backend-production.up.railway.app/api';
let adminToken = '';

// ===== HELPERS =====
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

async function api(path, options = {}) {
  const res = await fetch(API + path, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + adminToken,
      ...(options.headers || {})
    }
  });
  const data = await res.json();
  if (!data.success) throw new Error(data.message || 'Erreur serveur');
  return data;
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('fr-FR');
}

function fmtPrice(n) {
  return Number(n).toLocaleString('fr-FR') + ' FCFA';
}

// ===== LOGIN =====
async function adminLogin() {
  const email    = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPassword').value;
  const errEl    = document.getElementById('login-error');
  errEl.style.display = 'none';

  try {
    const result = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await result.json();
    if (!data.success) throw new Error(data.message);
    if (data.data.user.role !== 'admin') throw new Error('Accès réservé aux administrateurs');

    adminToken = data.data.token;
    document.getElementById('adminName').textContent = data.data.user.first_name + ' ' + data.data.user.last_name;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadStats();
    loadAll();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }
}

function logout() {
  adminToken = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

// ===== STATS =====
async function loadStats() {
  try {
    const result = await api('/reservations/admin/stats');
    const { totals, revenue, topExcursions } = result.data;
    renderStats(totals, revenue);
    renderTopExcursions(topExcursions);
  } catch (err) {
    showToast('Erreur stats : ' + err.message, true);
  }
}

function renderStats(t, revenue) {
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card blue">
      <div class="stat-icon">🚢</div>
      <div class="stat-value">${t.total}</div>
      <div class="stat-label">Réservations totales</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-icon">⏳</div>
      <div class="stat-value">${t.en_attente}</div>
      <div class="stat-label">En attente</div>
    </div>
    <div class="stat-card green">
      <div class="stat-icon">✅</div>
      <div class="stat-value">${t.confirme}</div>
      <div class="stat-label">Confirmées</div>
    </div>
    <div class="stat-card cyan">
      <div class="stat-icon">⛵</div>
      <div class="stat-value">${t.embarque}</div>
      <div class="stat-label">Embarqués</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-icon">💰</div>
      <div class="stat-value">${fmtPrice(revenue)}</div>
      <div class="stat-label">Chiffre d'affaires estimé</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📅</div>
      <div class="stat-value">${t.last_30_days}</div>
      <div class="stat-label">30 derniers jours</div>
    </div>
  `;
}

function renderTopExcursions(list) {
  if (!list || list.length === 0) {
    document.getElementById('top-exc-bars').innerHTML = '<div class="loading">Aucune donnée</div>';
    return;
  }
  const max = list[0].count;
  document.getElementById('top-exc-bars').innerHTML = list.map(e => `
    <div class="bar-item">
      <div class="bar-header">
        <span class="bar-name">${e.title}</span>
        <span class="bar-count">${e.count} rés.</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.round(e.count / max * 100)}%"></div>
      </div>
    </div>
  `).join('');
}

// ===== LISTE RESERVATIONS =====
async function loadAll() {
  try {
    const result = await api('/reservations/admin/all');
    renderTable(result.data);
  } catch (err) {
    document.getElementById('table-body').innerHTML =
      '<div class="loading">Erreur : ' + err.message + '</div>';
  }
}

function renderTable(list) {
  if (!list || list.length === 0) {
    document.getElementById('table-body').innerHTML =
      '<div class="loading">Aucune réservation</div>';
    return;
  }
  const rows = list.map(r => `
    <tr>
      <td><span class="ref">${r.reference}</span></td>
      <td><span class="name">${r.full_name}</span><br><small style="color:#64748b">${r.email}</small></td>
      <td>${r.excursion_title || '—'}</td>
      <td>${fmtDate(r.travel_date)}</td>
      <td>${r.passengers || 1}</td>
      <td><span class="badge ${r.status}">${labelStatus(r.status)}</span></td>
      <td>
        <select class="status-select" id="sel-${r.id}">
          <option value="en_attente"  ${r.status==='en_attente' ?'selected':''}>En attente</option>
          <option value="confirme"    ${r.status==='confirme'   ?'selected':''}>Confirmé</option>
          <option value="embarque"    ${r.status==='embarque'   ?'selected':''}>Embarqué</option>
          <option value="annule"      ${r.status==='annule'     ?'selected':''}>Annulé</option>
        </select>
        <button class="btn-save" onclick="saveStatus(${r.id})">✓</button>
      </td>
    </tr>
  `).join('');

  document.getElementById('table-body').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Référence</th>
          <th>Client</th>
          <th>Excursion</th>
          <th>Date</th>
          <th>Passagers</th>
          <th>Statut</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function labelStatus(s) {
  const map = { en_attente: 'En attente', confirme: 'Confirmé', embarque: 'Embarqué', annule: 'Annulé' };
  return map[s] || s;
}

async function saveStatus(id) {
  const sel = document.getElementById('sel-' + id);
  const newStatus = sel.value;
  try {
    await api('/reservations/admin/' + id + '/status', {
      method: 'PATCH',
      body: JSON.stringify({ status: newStatus })
    });
    showToast('✅ Statut mis à jour : ' + labelStatus(newStatus));
    loadAll();
    loadStats();
  } catch (err) {
    showToast('❌ ' + err.message, true);
  }
}

// Connexion au clavier (touche Entrée)
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
    adminLogin();
  }
});
</script>
</body>
</html>
